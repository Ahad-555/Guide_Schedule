openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: courses
    description: Course operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List all courses
      parameters:
        - name: college
          in: query
          schema:
            type: string
        - name: day
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a course
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseBody"
      responses:
        "201":
          description: Created course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /courses/{id}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "404":
          description: Not found
    put:
      operationId: updateCourse
      tags: [courses]
      summary: Update a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseBody"
      responses:
        "200":
          description: Updated course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
    delete:
      operationId: deleteCourse
      tags: [courses]
      summary: Delete a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /courses/bulk:
    post:
      operationId: bulkCreateCourses
      tags: [courses]
      summary: Bulk upsert courses from admin table
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                courses:
                  type: array
                  items:
                    $ref: "#/components/schemas/BulkCourseItem"
              required:
                - courses
      responses:
        "201":
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                required:
                  - count

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Course:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        instructor:
          type: string
        college:
          type: string
        day:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        room:
          type: string
        roomDescription:
          type: string
        officeHours:
          type: string
        officeLocation:
          type: string
      required:
        - id
        - name
        - instructor
        - college
        - day
        - startTime
        - endTime
        - room

    CreateCourseBody:
      type: object
      properties:
        name:
          type: string
        instructor:
          type: string
        college:
          type: string
        day:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        room:
          type: string
        roomDescription:
          type: string
        officeHours:
          type: string
        officeLocation:
          type: string
      required:
        - name
        - instructor
        - college
        - day
        - startTime
        - endTime
        - room

    BulkCourseItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        instructor:
          type: string
        college:
          type: string
        day:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        room:
          type: string
        roomDescription:
          type: string
        officeHours:
          type: string
        officeLocation:
          type: string
      required:
        - name
        - instructor
        - college
        - day
        - startTime
        - endTime
        - room
