kind = "web"
previewPath = "/"
title = "دليل كليتي التفاعلي"
version = "1.0.0"
id = "artifacts/college-guide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25103

[services.development]
run = "pnpm --filter @workspace/college-guide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/college-guide", "run", "build" ]
publicDir = "artifacts/college-guide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25103"
BASE_PATH = "/"
